<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Transparent Neuron | X-Ray View</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #2980b9;
            --highlight: #f1c40f;
            --bg: #fdfdfd;
            --text: #333;
            --panel-bg: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { margin-top: 0; color: var(--primary); text-align: center; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-style: italic; }

        /* VISUALIZATION STAGE */
        .stage {
            position: relative;
            height: 400px;
            background: #fff;
            border: 2px solid var(--primary);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; }

        /* CONTROLS */
        .controls-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label { font-weight: bold; font-size: 0.9rem; display: flex; justify-content: space-between; }
        input[type=range] { width: 100%; cursor: pointer; }

        .mode-toggle {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: #dcdde1;
            border-radius: 6px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background: #bdc3c7;
            color: var(--primary);
            transition: all 0.2s;
        }

        button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* NARRATIVE BOX */
        .narrative {
            margin-top: 20px;
            padding: 15px;
            border-left: 5px solid var(--highlight);
            background: #fff3cd;
            color: #5d4d00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>The Transparent Neuron</h1>
    <div class="subtitle">"Inside each neuron, the same ‘weight·variable + bias’ equation is happening."</div>

    <div class="stage">
        <canvas id="neuronCanvas"></canvas>
    </div>

    <div class="controls-area">
        <div class="mode-toggle">
            <button id="btn-simple" class="active" onclick="setMode('simple')">1. Simple View (The Biological Metaphor)</button>
            <button id="btn-xray" onclick="setMode('xray')">2. X-Ray View (The Math)</button>
        </div>

        <div class="control-group">
            <label>Input 1 (x₁): <span id="val-x1">1.0</span></label>
            <input type="range" id="x1" min="-5" max="5" step="0.1" value="1.0">
            
            <label>Weight 1 (w₁): <span id="val-w1">0.5</span></label>
            <input type="range" id="w1" min="-2" max="2" step="0.1" value="0.5">
        </div>

        <div class="control-group">
            <label>Input 2 (x₂): <span id="val-x2">2.0</span></label>
            <input type="range" id="x2" min="-5" max="5" step="0.1" value="2.0">
            
            <label>Weight 2 (w₂): <span id="val-w2">0.5</span></label>
            <input type="range" id="w2" min="-2" max="2" step="0.1" value="0.5">

            <label>Bias (b): <span id="val-b">0.0</span></label>
            <input type="range" id="b" min="-5" max="5" step="0.1" value="0.0">
        </div>
    </div>

    <div class="narrative" id="narrative-text">
        <strong>The Simple View:</strong> This looks like a biological cell. Signals come in, they get combined, and a signal goes out. But this is too abstract. Click "X-Ray View" to see what is actually happening.
    </div>
</div>

<script>
    /**
     * VISUALIZATION ENGINE
     * Renders a single neuron.
     * Mode 'simple': Draws circles and lines.
     * Mode 'xray': Draws the algebraic formula z = wx + b inside the neuron.
     */
    
    const canvas = document.getElementById('neuronCanvas');
    const ctx = canvas.getContext('2d');

    // State
    let mode = 'simple'; // 'simple' or 'xray'
    let state = { x1: 1.0, w1: 0.5, x2: 2.0, w2: 0.5, b: 0.0 };

    // Resize handling
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        draw();
    }
    window.addEventListener('resize', resize);

    // Inputs handling
    const inputs = ['x1', 'w1', 'x2', 'w2', 'b'];
    inputs.forEach(id => {
        const el = document.getElementById(id);
        const disp = document.getElementById(`val-${id}`);
        el.addEventListener('input', (e) => {
            state[id] = parseFloat(e.target.value);
            disp.innerText = state[id].toFixed(1);
            draw();
        });
    });

    function setMode(m) {
        mode = m;
        document.getElementById('btn-simple').className = mode === 'simple' ? 'active' : '';
        document.getElementById('btn-xray').className = mode === 'xray' ? 'active' : '';
        
        const narrative = document.getElementById('narrative-text');
        if (mode === 'simple') {
            narrative.innerHTML = `<strong>The Simple View:</strong> Inputs flow in, get mixed, and an output flows out. It looks magical, but it hides the mechanism.`;
        } else {
            narrative.innerHTML = `<strong>The X-Ray View:</strong> Look inside. It is literally just the linear formula <code>z = w·x + b</code>. The "Activation" curve on the right simply squashes that result to be between 0 and 1.`;
        }
        draw();
    }

    // Drawing Logic
    function draw() {
        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2; // Center X
        const cy = h / 2; // Center Y

        ctx.clearRect(0, 0, w, h);

        // Coordinates
        const inputX = w * 0.15;
        const nodeX = cx;
        const outputX = w * 0.85;

        const y1 = cy - 80; // Input 1 Y
        const y2 = cy + 80; // Input 2 Y

        // 1. Draw Wires (Inputs -> Node)
        drawWire(inputX, y1, nodeX - 70, cy, state.w1, state.x1);
        drawWire(inputX, y2, nodeX - 70, cy, state.w2, state.x2);

        // 2. Draw Input Nodes
        drawNode(inputX, y1, 25, `x₁`, state.x1);
        drawNode(inputX, y2, 25, `x₂`, state.x2);

        // 3. Draw Main Neuron Body
        // The neuron is split into two parts: Summation (Left) and Activation (Right)
        
        // Main Circle
        ctx.beginPath();
        ctx.arc(cx, cy, 80, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = varColor('--primary');
        ctx.stroke();

        // Calculation
        const z = (state.x1 * state.w1) + (state.x2 * state.w2) + state.b;
        
        // Sigmoid Activation
        const activation = 1 / (1 + Math.exp(-z));

        if (mode === 'simple') {
            // SIMPLE MODE: Just a nucleus
            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, Math.PI * 2);
            ctx.fillStyle = varColor('--accent');
            ctx.fill();
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("Neuron", cx, cy + 50);

        } else {
            // X-RAY MODE: Show the math inside
            
            // Draw Divider inside neuron (Sum vs Activation)
            ctx.beginPath();
            ctx.moveTo(cx + 10, cy - 75);
            ctx.lineTo(cx + 10, cy + 75);
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.stroke();

            // LEFT SIDE: The Linear Sum (z = wx + b)
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            ctx.font = '14px monospace';
            
            // The Formula
            ctx.fillText(`(${state.w1}·${state.x1}) +`, cx - 35, cy - 20);
            ctx.fillText(`(${state.w2}·${state.x2}) +`, cx - 35, cy);
            ctx.fillText(`b(${state.b})`, cx - 35, cy + 20);
            
            // The Result (Z)
            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = varColor('--accent');
            ctx.fillText(`z = ${z.toFixed(2)}`, cx - 35, cy + 50);


            // RIGHT SIDE: The Activation Graph
            const graphX = cx + 20;
            const graphY = cy;
            const graphW = 40;
            const graphH = 40;
            
            // Axis
            ctx.beginPath();
            ctx.moveTo(graphX, graphY - 25);
            ctx.lineTo(graphX, graphY + 25); // Y axis
            ctx.moveTo(graphX, graphY);
            ctx.lineTo(graphX + graphW, graphY); // X axis
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Sigmoid Curve (Pre-drawn shape)
            ctx.beginPath();
            ctx.moveTo(graphX, graphY + 20);
            ctx.bezierCurveTo(graphX + 10, graphY + 20, graphX + 10, graphY - 20, graphX + graphW, graphY - 20);
            ctx.strokeStyle = varColor('--accent');
            ctx.lineWidth = 2;
            ctx.stroke();

            // The "Ball" on the curve representing current value
            // Map z (approx -5 to 5) to width (0 to 40)
            let ballX = ((z + 5) / 10) * graphW;
            if(ballX < 0) ballX = 0;
            if(ballX > graphW) ballX = graphW;
            
            // Map activation (0 to 1) to height (+20 to -20)
            let ballY = 20 - (activation * 40);

            ctx.beginPath();
            ctx.arc(graphX + ballX, graphY + ballY - 20, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'red';
            ctx.fill();
        }

        // 4. Draw Output Wire
        drawWire(cx + 80, cy, outputX, cy, 1, activation);

        // 5. Draw Output Node
        drawNode(outputX, cy, 30, `y`, activation.toFixed(2));
        
        // Output Label
        ctx.fillStyle = '#7f8c8d';
        ctx.font = '14px sans-serif';
        ctx.fillText("Output (0-1)", outputX, cy + 50);

    }

    // Helpers
    function drawNode(x, y, r, label, value) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 16px monospace';
        ctx.fillText(label, x, y - 8);
        
        ctx.font = '12px monospace';
        ctx.fillStyle = varColor('--accent');
        ctx.fillText(value, x, y + 8);
    }

    function drawWire(x1, y1, x2, y2, weight, signalStrength) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        
        // Thickness depends on absolute weight
        ctx.lineWidth = Math.abs(weight) * 5 + 1; 
        
        // Color depends on sign of weight (Red negative, Blue positive)
        // If it's the output wire, it's just signal color
        if(arguments.length > 5) {
             // Input wire
             ctx.strokeStyle = weight >= 0 ? 'rgba(44, 62, 80, 0.5)' : 'rgba(192, 57, 43, 0.5)';
        } else {
             ctx.strokeStyle = '#333';
        }
        
        ctx.stroke();

        // Draw flowing signal (simple circles moving)
        const time = Date.now() / 500;
        const offset = time % 1;
        const lx = x1 + (x2 - x1) * offset;
        const ly = y1 + (y2 - y1) * offset;
        
        ctx.beginPath();
        ctx.arc(lx, ly, 4, 0, Math.PI*2);
        ctx.fillStyle = varColor('--highlight');
        ctx.fill();
    }

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Init
    resize();

</script>
</body>
</html>
