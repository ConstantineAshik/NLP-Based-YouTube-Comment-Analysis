<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Box Maker | Decision Tree Overfitting</title>
    <style>
        :root {
            --primary: #27ae60;
            --accent: #2c3e50;
            --box-highlight: rgba(231, 76, 60, 0.3); /* Red box for noise */
            --bg: #f8fafc;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { margin-top: 0; color: var(--accent); text-align: center; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; }

        /* VISUALIZATION STAGE */
        .stage {
            position: relative;
            height: 450px;
            background: #fff;
            border: 2px solid var(--accent);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        canvas { width: 100%; height: 100%; display: block; }

        /* CONTROLS */
        .controls-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            align-items: center;
        }

        .step-display {
            font-weight: bold;
            font-size: 1.2rem;
            min-width: 100px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            background: var(--primary);
            color: white;
            transition: transform 0.2s;
        }
        button:hover { background: #219150; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* NARRATIVE BOX */
        .narrative {
            margin-top: 20px;
            padding: 20px;
            border-left: 5px solid var(--primary);
            background: #e8f8f5;
            color: #145a32;
            min-height: 120px;
            display: flex;
            align-items: center;
        }

        .rule-chain {
            font-family: monospace;
            display: block;
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 5px;
            color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>The Box Maker</h1>
    <div class="subtitle">How a Decision Tree creates "floating boxes" to isolate noise.</div>

    <div class="stage" id="stage">
        <canvas id="treeCanvas"></canvas>
    </div>

    <div class="controls-area">
        <button id="btn-prev" onclick="changeStep(-1)" disabled>Previous</button>
        <div class="step-display" id="stepDisplay">Step 0</div>
        <button id="btn-next" onclick="changeStep(1)">Next Step</button>
    </div>

    <div class="narrative" id="narrative-text">
        </div>
</div>

<script>
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    const stage = document.getElementById('stage');

    const dpr = window.devicePixelRatio || 1;
    let w, h;

    // State
    let currentStep = 0;
    const totalSteps = 7; 
    
    // The "Noise Point" we want to trap (Normalized 0-1 coords)
    // Let's place it in the Top-Left quadrant, but somewhat central
    const noisePt = {x: 0.35, y: 0.35};

    // The bounds of our "Box" around the noise point
    // We will create cuts at these locations
    const box = {
        left: 0.25,
        right: 0.45,
        top: 0.25,
        bottom: 0.45
    };

    // Main cross splits
    const splitX = 0.6;
    const splitY = 0.6;

    // Data Points
    const points = [];
    function generateData() {
        points.length = 0;
        // Cluster A (Top Left Background) - Blue
        for(let i=0; i<40; i++) {
            points.push({x: Math.random()*0.55, y: Math.random()*0.55, type: 'A'});
        }
        // Cluster B (Bottom Right Background) - Red
        for(let i=0; i<40; i++) {
            points.push({x: 0.65 + Math.random()*0.3, y: 0.65 + Math.random()*0.3, type: 'B'});
        }
        
        // THE NOISE POINT (Red point in Blue land)
        points.push({x: noisePt.x, y: noisePt.y, type: 'B', isNoise: true});
    }

    const steps = [
        {
            title: "0. The Problem",
            desc: "We have two main clusters. But look at that one <strong>Red Dot</strong> in the top-left Blue area. That is 'Noise'.<br>How can the tree isolate just that one point?"
        },
        {
            title: "1. The Main Split (Vertical)",
            desc: "First, the tree splits the world into Left and Right. <br><code>x < 0.6</code>"
        },
        {
            title: "2. The Main Split (Horizontal)",
            desc: "Then it splits the Left region (Top vs Bottom). <br><code>y < 0.6</code><br>Now we have a 'Blue Zone' in the top-left. But the Red Dot is still there!"
        },
        {
            title: "3. Trapping the Dot: Cut 1 (Left Wall)",
            desc: "To isolate the dot, we must start fencing it in. The tree adds a vertical split inside this region.<br><code>x > 0.25</code>"
        },
        {
            title: "4. Trapping the Dot: Cut 2 (Right Wall)",
            desc: "It cuts again to the right of the dot.<br><code>x < 0.45</code><br>Now the dot is trapped in a vertical <strong>strip</strong>."
        },
        {
            title: "5. Trapping the Dot: Cut 3 (Top Wall)",
            desc: "We need to close the box. The tree adds a horizontal split above the dot.<br><code>y > 0.25</code>"
        },
        {
            title: "6. Trapping the Dot: Cut 4 (Bottom Wall)",
            desc: "Finally, it cuts below the dot.<br><code>y < 0.45</code><br><strong>Look!</strong> A floating box is formed."
        },
        {
            title: "7. The Final Logic",
            desc: "The 'Box' isn't magic. It is just a very specific chain of 4 Yes/No questions:<br><span class='rule-chain'>IF (x < 0.6) AND (y < 0.6) <br>AND (x > 0.25) AND (x < 0.45)<br>AND (y > 0.25) AND (y < 0.45)<br>THEN Class = Red</span>"
        }
    ];

    function init() {
        generateData();
        resize();
        update();
    }

    function resize() {
        w = stage.clientWidth;
        h = stage.clientHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
        draw();
    }
    window.addEventListener('resize', resize);

    function changeStep(delta) {
        currentStep += delta;
        if(currentStep < 0) currentStep = 0;
        if(currentStep > totalSteps) currentStep = totalSteps;
        update();
    }

    function update() {
        document.getElementById('btn-prev').disabled = currentStep === 0;
        document.getElementById('btn-next').disabled = currentStep === totalSteps;
        document.getElementById('stepDisplay').innerText = `Step ${currentStep}`;
        
        const s = steps[currentStep];
        document.getElementById('narrative-text').innerHTML = `
            <div>
                <strong style="font-size: 1.1rem; display:block; margin-bottom:5px;">${s.title}</strong>
                ${s.desc}
            </div>
        `;
        draw();
    }

    // --- DRAWING ENGINE ---
    function draw() {
        ctx.clearRect(0,0,w,h);

        const mx = splitX * w;
        const my = splitY * w; // Keep square aspectish

        // Draw Regions Background (To show "purity")
        if (currentStep >= 7) {
            // Fill the box area red
            const bx1 = box.left * w;
            const bx2 = box.right * w;
            const by1 = box.top * h;
            const by2 = box.bottom * h;
            
            ctx.fillStyle = 'rgba(231, 76, 60, 0.2)'; // Red tint
            ctx.fillRect(bx1, by1, bx2-bx1, by2-by1);
        }

        ctx.lineWidth = 2;
        ctx.lineCap = 'round';

        // 1. Main Vertical Split (x < 0.6)
        if(currentStep >= 1) {
            ctx.strokeStyle = '#2c3e50';
            drawLine(mx, 0, mx, h);
            drawLabel("x < 0.6", mx + 5, 20);
        }

        // 2. Main Horizontal Split (y < 0.6), restricted to Left Side
        if(currentStep >= 2) {
            ctx.strokeStyle = '#2c3e50';
            // In a real tree, this might go all the way across, 
            // but let's show it splitting the left region to enable the box.
            const splitYPos = splitY * h;
            drawLine(0, splitYPos, mx, splitYPos);
            drawLabel("y < 0.6", 10, splitYPos - 5);
        }

        // --- THE BOX CUTS ---
        
        // 3. Cut Left Wall (x > 0.25)
        // Restricted to: Left of main split, Top of main split
        const lx = box.left * w;
        const rx = box.right * w;
        const ty = box.top * h;
        const by = box.bottom * h;
        const regionCeiling = splitY * h;

        if(currentStep >= 3) {
            ctx.strokeStyle = '#e67e22'; // Orange for box cuts
            // Draws vertical line from Top(0) to RegionCeiling
            drawLine(lx, 0, lx, regionCeiling);
        }

        // 4. Cut Right Wall (x < 0.45)
        if(currentStep >= 4) {
            drawLine(rx, 0, rx, regionCeiling);
        }

        // 5. Cut Top Wall (y > 0.25)
        // Restricted to: Between Left Wall and Right Wall
        if(currentStep >= 5) {
            ctx.strokeStyle = '#c0392b'; // Darker red for horizontal box cuts
            drawLine(lx, ty, rx, ty);
        }

        // 6. Cut Bottom Wall (y < 0.45)
        if(currentStep >= 6) {
            drawLine(lx, by, rx, by);
        }

        // --- POINTS ---
        points.forEach(p => {
            const px = p.x * w;
            const py = p.y * h;
            
            ctx.beginPath();
            
            // Special styling for the noise point
            if(p.isNoise) {
                ctx.arc(px, py, 8, 0, Math.PI*2);
                ctx.fillStyle = '#e74c3c';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            } else {
                ctx.arc(px, py, 5, 0, Math.PI*2);
                ctx.fillStyle = p.type === 'A' ? '#3498db' : '#e74c3c';
            }
            ctx.fill();
        });
    }

    function drawLine(x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }

    function drawLabel(text, x, y) {
        ctx.fillStyle = '#333';
        ctx.font = '12px monospace';
        ctx.fillText(text, x, y);
    }

    init();

</script>
</body>
</html>
